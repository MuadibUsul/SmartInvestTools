name: Deploy Smart Invest Tools

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 8.140.219.56
          username: root
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            bash <<'EOF'
            set -euxo pipefail

            export DEPLOY_DIR="/var/www/smartinvesttools"
            export REPO_URL="https://github.com/MuadibUsul/SmartInvestTools.git"
            export BRANCH="master"
            export NEXT_TELEMETRY_DISABLED=1

            echo "== Environment =="
            whoami
            hostname
            pwd
            command -v node || true
            command -v npm || true
            command -v git || true

            echo "== Prepare deploy directory =="
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            pwd
            ls -la

            echo "== Sync source =="
            REPO_STATE="$(git rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo git || echo empty)"
            case "$REPO_STATE" in
              git)
                git fetch origin "$BRANCH"
                git reset --hard "origin/$BRANCH"
                ;;
              empty)
                DIR_CONTENT_COUNT="$(find . -mindepth 1 -maxdepth 1 -print -quit | wc -c)"
                case "$DIR_CONTENT_COUNT" in
                  0)
                    git clone --branch "$BRANCH" "$REPO_URL" .
                    ;;
                  *)
                    echo "Deploy directory exists but is not a git repository."
                    exit 1
                    ;;
                esac
                ;;
            esac

            echo "== Install dependencies =="
            npm ci

            echo "== Build application =="
            npm run build

            echo "== Ensure pm2 =="
            PM2_PATH="$(command -v pm2 || true)"
            case "$PM2_PATH" in
              "")
                npm install -g pm2
                ;;
              *)
                echo "pm2 already installed at $PM2_PATH"
                ;;
            esac

            echo "== Start application =="
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
            pm2 list
            EOF
