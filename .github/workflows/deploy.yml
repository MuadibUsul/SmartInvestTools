name: Deploy Smart Invest Tools

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 8.140.219.56
          username: root
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 60m
          script: >
            bash -lc '
            set -euxo pipefail;
            export DEPLOY_DIR="/var/www/smartinvesttools";
            export REPO_URL="https://github.com/MuadibUsul/SmartInvestTools.git";
            export BRANCH="master";
            export NEXT_TELEMETRY_DISABLED=1;
            echo "== Environment ==";
            whoami;
            hostname;
            pwd;
            command -v node || true;
            command -v npm || true;
            command -v git || true;
            echo "== Prepare deploy directory ==";
            mkdir -p "$DEPLOY_DIR";
            cd "$DEPLOY_DIR";
            pwd;
            ls -la;
            echo "== Sync source ==";
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              git fetch origin "$BRANCH";
              git reset --hard "origin/$BRANCH";
            else
              if [ -n "$(find . -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                echo "Deploy directory exists but is not a git repository.";
                exit 1;
              fi;
              git clone --branch "$BRANCH" "$REPO_URL" .;
            fi;
            echo "== Configure npm ==";
            npm config set registry https://registry.npmmirror.com;
            npm config set fund false;
            npm config set audit false;
            npm config set fetch-retries 5;
            npm config set fetch-retry-maxtimeout 120000;
            npm config get registry;
            echo "== Install dependencies ==";
            npm ci --no-audit --no-fund --prefer-offline;
            echo "== Build application ==";
            npm run build;
            echo "== Ensure pm2 ==";
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2 --no-audit --no-fund;
            fi;
            echo "== Start application ==";
            pm2 startOrReload ecosystem.config.cjs --update-env;
            pm2 save;
            pm2 list;
            '
